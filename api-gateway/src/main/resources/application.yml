server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # ── User Service ──
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**

        # ── Payment Service ──
        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/payments/**

        # ── Ledger Service ──
        - id: ledger-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/ledger/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

  data:
    redis:
      host: localhost
      port: 6379

# ── JWT Configuration ──
peerpay:
  jwt:
    secret: PeerPaySuperSecretKeyForJWTTokenSigningMin256Bits!!

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    gateway:
      enabled: true

# ── Logging ──
logging:
  level:
    com.peerpay.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
