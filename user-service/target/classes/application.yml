server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/peerpay_users
    username: peerpay
    password: peerpay_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ── JWT Configuration ──
peerpay:
  jwt:
    secret: PeerPaySuperSecretKeyForJWTTokenSigningMin256Bits!!

# ── Logging ──
logging:
  level:
    com.peerpay.user: DEBUG
    org.hibernate.SQL: INFO

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
