input {
  tcp {
    port => 5001
    codec => json_lines
  }
  udp {
    port => 5001
    codec => json_lines
  }
}

filter {
  # Add environment metadata
  mutate {
    add_field => { "environment" => "development" }
  }

  # Parse timestamp if present
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # Extract service name from logger if not present
  if ![service] and [logger_name] {
    grok {
      match => { "logger_name" => "com\.peerpay\.%{WORD:service}\." }
      tag_on_failure => []
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "peerpay-logs-%{+YYYY.MM.dd}"
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
